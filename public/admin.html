<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop - Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Simple Store Admin</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div style="display: flex; gap: 2rem; flex-direction: column;">
            <div class="auth-container" style="max-width: 600px; margin: 0 auto;">
                <h2>Add New Product</h2>
                <form id="add-product-form" onsubmit="handleAddProduct(event)">
                    <!-- ... form fields ... -->
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="p-name" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="p-desc" style="width: 100%; padding: 0.8rem; border: 2px solid #eee; border-radius: 8px; min-height: 100px;" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" step="0.01" id="p-price" required>
                    </div>
                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="url" id="p-image" placeholder="https://example.com/image.jpg" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="p-category" required>
                    </div>
                    <div class="form-group">
                        <label>Stock Quantity</label>
                        <input type="number" id="p-stock" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Product</button>
                </form>
            </div>

            <div class="auth-container" style="max-width: 1000px; margin: 2rem auto;">
                <h2>Manage Orders</h2>
                <div id="admin-order-list">
                    <p>Loading all orders...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        // Protect route
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('role');
            if (role !== 'admin') {
                alert('Access denied. Redirecting to home...');
                window.location.href = 'index.html';
            }
            loadAllOrders();
        });

        async function loadAllOrders() {
            const token = getToken();
            try {
                const response = await fetch(`${API_URL}/admin/orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const orders = await response.json();
                const list = document.getElementById('admin-order-list');

                if (orders.length === 0) {
                    list.innerHTML = '<p>No orders found in the system.</p>';
                    return;
                }

                list.innerHTML = orders.map(order => `
                    <div class="cart-item" style="flex-direction: column; align-items: flex-start; gap: 0.5rem; border-left: 5px solid var(--ethio-green);">
                        <div style="display: flex; justify-content: space-between; width: 100%;">
                            <strong>Order #${order._id.substring(0, 8)}</strong>
                            <span>Customer: <strong>${order.userId.username}</strong> (${order.userId.email})</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; width: 100%;">
                            <span>Date: ${new Date(order.createdAt).toLocaleString()}</span>
                            <span style="color: var(--ethio-red); font-weight: bold;">Total: $${order.total.toFixed(2)}</span>
                        </div>
                        <div style="font-size: 0.9rem; color: #666;">
                            Items: ${order.items.map(i => `${i.name} (${i.quantity})`).join(', ')}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading admin orders:', error);
                document.getElementById('admin-order-list').innerHTML = '<p>Error loading orders.</p>';
            }
        }

        async function handleAddProduct(event) {
            // ... same handleAddProduct logic ...
            event.preventDefault();
            const token = getToken();
            
            const productData = {
                name: document.getElementById('p-name').value,
                description: document.getElementById('p-desc').value,
                price: parseFloat(document.getElementById('p-price').value),
                image: document.getElementById('p-image').value,
                category: document.getElementById('p-category').value,
                stock: parseInt(document.getElementById('p-stock').value)
            };

            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(productData)
                });

                if (response.ok) {
                    alert('Product added successfully!');
                    document.getElementById('add-product-form').reset();
                    // Optional: refresh any product list if present
                } else {
                    const data = await response.json();
                    alert(data.message || 'Failed to add product');
                }
            } catch (error) {
                alert('An error occurred while adding the product');
            }
        }
    </script>
</body>
</html>
